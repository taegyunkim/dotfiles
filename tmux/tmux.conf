# Status line configuration
set -g status-left-length 52
set -g status-right-length 451
set -g status-fg '#fdf6e3'
set -g status-bg '#002b36'
set -g pane-border-style fg=#839496
set -g pane-active-border-style fg=#268bd2
set -g message-style fg=colour16,bg=colour221,bold
set -g status-left '#[fg=#586e75,bg=#fdf6e3,bold] ❐ #S #[fg=#fdf6e3,bg=#002b36,nobold]#[fg=#839496,bg=#002b36,bold] #(whoami) #[fg=#002b36,bg=#002b36,nobold]'
set -g window-status-format "#[fg=#586e75,bg=#fdf6e3,bold] #I #W "
set -g window-status-current-format "#[fg=#002b36,bg=#268bd2]#[fg=black,bg=#268bd2,noreverse,bold] #I: #W #[fg=#268bd2,bg=#002b36,nobold]"

# Mouse settings
set -g mouse on
# to enable mouse scroll, see
# https://github.com/tmux/tmux/issues/145#issuecomment-150736967
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft='#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# Sane scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# vim style splits
# TODO: tmux 1.9 default-path option is removed
# http://unix.stackexchange.com/questions/12032/create-new-window-with-current-directory-in-tmux
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Automatically set window title and renumber windows.
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g renumber-windows on

set -g default-terminal screen-256color

# Prevent path_helper from reordering PATH in tmux (start non-login shell)
set -g default-command "${SHELL}"

set -g history-limit 30000

if-shell '[ $(tmux -V | cut -d" " -f2 | tr -d a-z | awk -F. "{printf "%d%02d", $1, $2}") -ge 303 ]' 'set -g allow-passthrough on'

# On macOS: let SSH_AUTH_SOCK update naturally from the environment (launchd manages the agent socket)
# On Linux/remote: freeze SSH_AUTH_SOCK and point it at a stable symlink updated on each SSH reconnect
if-shell 'test "$(uname)" = "Darwin"' \
  'set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AGENT_PID SSH_AUTH_SOCK SSH_CONNECTION WINDOWID XAUTHORITY"' \
  'set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"; setenv -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock'

# Nested tmux: when this tmux is started over SSH (i.e. a remote tmux
# running inside the local outer tmux), swap prefix from C-b to C-a so
# the two layers don't fight over keys. Also tint the active-window
# highlight red so it's visually obvious which tmux is which.
if-shell '[ -n "$SSH_CONNECTION" ]' {
  unbind C-b
  set -g prefix C-a
  bind C-a send-prefix
  set -g window-status-current-format "#[fg=#002b36,bg=#dc322f]#[fg=black,bg=#dc322f,noreverse,bold] #I: #W #[fg=#dc322f,bg=#002b36,nobold]"
}

# https://github.com/tmux-plugins/tpm/issues/70#issuecomment-507542088
set -g @tpm-clean 'u'

# TPM
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
#
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
